name: CI/CD Pipeline to AWS ECR

on:
  push:
    branches: [ "master", "main" ]

env:
  # ATENCIÓN: Cambia esto por el nombre de tu repositorio en AWS ECR
  ECR_REPOSITORY_NAME: "app-cicd-duoc" 

jobs:
  # ==========================================
  # FASE 1: CI - VALIDACIÓN DEL CÓDIGO
  # ==========================================
  ci_validation:
    name: 🔒 Compliance & 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Instalar Dependencias
        run: npm ci
        
      # Ejecutamos pruebas y auditoría. Si alguno falla, el job se detiene.
      - name: Ejecutar Auditoría de Seguridad
        run: npm audit --audit-level=critical
        
      - name: Ejecutar Pruebas
        run: npm test

  # ==========================================
  # FASE 2: CD - CONTENERIZACIÓN Y REGISTRO
  # ==========================================
  cd_build_push:
    name: 🐳 Build & Push a Amazon ECR
    runs-on: ubuntu-latest
    needs: [ci_validation] # Este es el GATE: requiere que CI pase exitosamente
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: "us-east-1"

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, y Push de la imagen
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY_NAME }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY_NAME }}:$IMAGE_TAG
